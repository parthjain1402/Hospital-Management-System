
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expiry Tracking</title>

    <style>

        body{
            font-family:Arial;
            background:#f1f5f9;
            padding:30px;
        }

        h1{

            margin-bottom:20px;
            color:#2563eb;
        }

        table{

            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td{

            padding:15px;
            border:1px solid #ddd;
            text-align:center;
        }

        th{

            background:#2563eb;
            color:white;
        }

        .expired{
            background:#fecaca;
        }

    </style>

</head>

<body>

    <h1>Medicine Expiry Tracking</h1>

    <table>

        <tr>

            <th>Medicine ID</th>
            <th>Medicine Name</th>
            <th>Category</th>
            <th>Stock</th>
            <th>Expiry Date</th>

        </tr>

        {% for medicine in medicines %}

        <tr>

            <td>{{ medicine[1] }}</td>
            <td>{{ medicine[2] }}</td>
            <td>{{ medicine[3] }}</td>
            <td>{{ medicine[5] }}</td>
            <td>{{ medicine[7] }}</td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
