
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attendance Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f1f5f9;
        }

        .topbar{
            background:#0f172a;
            color:white;
            padding:20px;

            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logout-btn{

            background:red;
            color:white;

            border:none;
            padding:12px 20px;
            border-radius:8px;

            cursor:pointer;
        }

        .container{
            width:95%;
            margin:auto;
            margin-top:30px;
        }

        .actions{

            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        .btn{

            background:#2563eb;
            color:white;

            border:none;
            padding:14px 20px;
            border-radius:10px;

            cursor:pointer;
            font-size:16px;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        table{

            width:100%;
            border-collapse:collapse;
            background:white;

            border-radius:15px;
            overflow:hidden;
        }

        table th{

            background:#2563eb;
            color:white;
            padding:15px;
        }

        table td{

            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

    </style>

</head>

<body>

    <div class="topbar">

        <h1>Attendance Dashboard</h1>

        <a href="{{ url_for('logout') }}">
            <button class="logout-btn">Logout</button>
        </a>

    </div>

    <div class="container">

     
        <div class="actions">

            <a href="{{ url_for('mark_attendance') }}">
                <button class="btn">
                    Mark Attendance
                </button>
            </a>

            <a href="{{ url_for('payroll_dashboard') }}">
                <button class="btn">
                    Payroll Dashboard
                </button>
            </a>

           
            <a href="{{ url_for('leave_dashboard') }}">
                <button class="btn">
                    Leave Dashboard
                </button>
            </a>

            
            <a href="{{ url_for('shift_dashboard') }}">
                <button class="btn">
                    Shift Dashboard
                </button>
            </a>

            

        </div>



        <table>

            <tr>

                <th>Attendance ID</th>
                <th>Employee</th>
                <th>Role</th>
                <th>Date</th>
                <th>Check In</th>
                <th>Check Out</th>
                <th>Status</th>

            </tr>

            {% for row in attendance_records %}

            <tr>

                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
                <td>{{ row[4] }}</td>
                <td>{{ row[5] }}</td>
                <td>{{ row[6] }}</td>
                <td>{{ row[7] }}</td>

            </tr>

            {% endfor %}

        </table>

    </div>

</body>
</html>
