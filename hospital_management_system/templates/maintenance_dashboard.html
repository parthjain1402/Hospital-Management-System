<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Maintenance Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f1f5f9;
        }

        .topbar{

            background:#0f172a;
            color:white;
            padding:20px;
        }

        .container{

            width:95%;
            margin:auto;
            margin-top:40px;
        }

        .add-btn{

            background:#2563eb;
            color:white;
            padding:12px 20px;
            border:none;
            border-radius:10px;
            margin-bottom:20px;
            cursor:pointer;
        }

        table{

            width:100%;
            background:white;
            border-collapse:collapse;
        }

        table th,
        table td{

            padding:15px;
            border:1px solid #ddd;
            text-align:center;
        }

        table th{

            background:#2563eb;
            color:white;
        }

    </style>

</head>

<body>

    <div class="topbar">

        <h1>Maintenance Dashboard</h1>

    </div>

    <div class="container">

        <a href="{{ url_for('add_maintenance') }}">

            <button class="add-btn">
                Add Maintenance Log
            </button>

        </a>

        <table>

            <tr>

                <th>Maintenance ID</th>
                <th>Equipment</th>
                <th>Engineer</th>
                <th>Type</th>
                <th>Maintenance Date</th>
                <th>Next Service</th>
                <th>Status</th>

            </tr>

            {% for log in logs %}

            <tr>

                <td>{{ log[1] }}</td>
                <td>{{ log[2] }}</td>
                <td>{{ log[3] }}</td>
                <td>{{ log[4] }}</td>
                <td>{{ log[5] }}</td>
                <td>{{ log[6] }}</td>
                <td>{{ log[8] }}</td>

            </tr>

            {% endfor %}

        </table>

    </div>

</body>

</html>
