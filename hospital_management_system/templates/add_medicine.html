<!DOCTYPE html>
<html>
<head>

    <title>Add Medicine</title>

    <style>

        body{
            font-family:Arial;
            background:#f1f5f9;
        }

        .container{

            width:500px;
            background:white;
            margin:40px auto;
            padding:30px;
            border-radius:10px;
        }

        input{

            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{

            width:100%;
            padding:15px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Add Medicine</h1>

    <form method="POST">

        <input type="text" name="medicine_name" placeholder="Medicine Name" required>

        <input type="text" name="category" placeholder="Category" required>

        <input type="text" name="supplier" placeholder="Supplier" required>

        <input type="number" name="stock_quantity" placeholder="Stock Quantity" required>

        <input type="number" step="0.01" name="price" placeholder="Price" required>

        <label>Manufacture Date</label>

        <input type="date" name="manufacture_date" required>

        <label>Expiry Date</label>

        <input type="date" name="expiry_date" required>

        <input type="number" name="alert_level" placeholder="Alert Level" required>

        <button type="submit">
            Add Medicine
        </button>

    </form>

</div>

</body>
</html>
