
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Payroll</title>

    <style>

        body{
            background:#f1f5f9;
            font-family:Arial;
        }

        .form-container{

            width:500px;
            margin:auto;
            margin-top:40px;

            background:white;
            padding:30px;

            border-radius:15px;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        input, select{

            width:100%;
            padding:14px;

            margin-bottom:20px;

            border:1px solid #ccc;
            border-radius:10px;
        }

        button{

            width:100%;
            padding:15px;

            background:#2563eb;
            color:white;

            border:none;
            border-radius:10px;

            font-size:16px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="form-container">

        <h1>Add Payroll</h1>

        <form method="POST">

            <input type="text" name="employee_name" placeholder="Employee Name" required>

            <input type="text" name="employee_role" placeholder="Employee Role" required>

            <input type="number" step="0.01" name="basic_salary" placeholder="Basic Salary" required>

            <input type="number" step="0.01" name="bonus" placeholder="Bonus" required>

            <input type="number" step="0.01" name="deductions" placeholder="Deductions" required>

            <select name="payment_status" required>

                <option value="">Select Payment Status</option>

                <option>Paid</option>
                <option>Pending</option>

            </select>

            <button type="submit">
                Save Payroll
            </button>

        </form>

    </div>

</body>
</html>
