<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hospital Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f1f5f9;
        }

        /* =========================
           TOP NAVBAR
        ========================== */

        .topbar{

            background:#0f172a;
            color:white;
            padding:20px;

            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .profile{

            display:flex;
            align-items:center;
            gap:15px;
        }

        .profile img{

            width:70px;
            height:70px;
            border-radius:50%;
            border:3px solid white;
            object-fit:cover;
        }

        .logout-btn{

            background:red;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .logout-btn:hover{
            background:darkred;
        }

        /* =========================
           DASHBOARD CARDS
        ========================== */

        .dashboard{

            width:95%;
            margin:auto;
            margin-top:40px;

            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
        }

        .card{

            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);

            transition:0.3s;
            text-align:center;
        }

        .card:hover{

            transform:translateY(-5px);
        }

        .card h1{

            font-size:40px;
            color:#2563eb;
            margin-bottom:10px;
        }

        .card p{

            font-size:20px;
            color:#475569;
        }

        /* =========================
           NAVIGATION BUTTONS
        ========================== */

        .nav-buttons{

            width:95%;
            margin:auto;
            margin-top:40px;

            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
        }

        .nav-buttons a{

            text-decoration:none;
        }

        .nav-btn{

            width:100%;
            padding:18px;

            background:#2563eb;
            color:white;

            border:none;
            border-radius:12px;

            font-size:18px;
            cursor:pointer;

            transition:0.3s;
        }

        .nav-btn:hover{

            background:#1d4ed8;
        }

        .section{
            width:95%;
            margin:40px auto;
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .section h2{
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table th{
            background:#2563eb;
            color:white;
            padding:12px;
        }

        table td{
            padding:12px;
            border-bottom:1px solid #ddd;
        }

        select{
            padding:8px;
        }

        .assign-btn{
            background:green;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:5px;
            cursor:pointer;
        }

        /* =========================
           RESPONSIVE
        ========================== */

        @media(max-width:768px){

            .topbar{

                flex-direction:column;
                text-align:center;
                gap:20px;
            }
        }

    </style>

</head>

<body>

    <!-- =========================
         TOPBAR
    ========================== -->

    <div class="topbar">

        <div>

            <h1>Hospital Management System</h1>

            <br>

            <h3>
                Welcome {{ username }}
            </h3>

            <p>
                Role : {{ role }}
            </p>

        </div>

        <div class="profile">

            <img src="/{{ image }}" alt="Profile">

            <a href="{{ url_for('logout') }}">

                <button class="logout-btn">
                    Logout
                </button>

            </a>

        </div>

    </div>

    <!-- =========================
         DASHBOARD CARDS
    ========================== -->

    <div class="dashboard">

        <div class="card">

            <h1>{{ total_patients }}</h1>

            <p>Total Patients</p>

        </div>

        <div class="card">

            <h1>{{ total_doctors }}</h1>

            <p>Total Doctors</p>

        </div>

        <div class="card">

            <h1>{{ total_appointments }}</h1>

            <p>Appointments</p>

        </div>

        <div class="card">

            <h1>{{ total_emr }}</h1>

            <p>EMR Records</p>

        </div>

        <div class="card">

            <h1>{{ total_bills }}</h1>

            <p>Total Bills</p>

        </div>

        <div class="card">

            <h1>{{ emergency_count }}</h1>

            <p>Emergency Patients</p>

        </div>

    </div>

    <!-- =========================
         NAVIGATION
    ========================== -->

    <div class="nav-buttons">

        <a href="{{ url_for('patient_dashboard') }}">

            <button class="nav-btn">
                Patient Dashboard
            </button>

        </a>

        <a href="{{ url_for('doctor_dashboard') }}">

            <button class="nav-btn">
                Doctor Dashboard
            </button>

        </a>

        <a href="{{ url_for('appointments') }}">

            <button class="nav-btn">
                Appointments
            </button>

        </a>

        <!-- FIXED BILLING BUTTON -->

        <a href="{{ url_for('billing_dashboard') }}">

            <button class="nav-btn">
                Billing Section
            </button>

        </a>

        <a href="{{ url_for('lab_dashboard') }}">

            <button class="nav-btn">
                Lab Dashboard
            </button>
    
        </a>


        <a href="{{ url_for('pharmacy_dashboard') }}">

            <button class="nav-btn">
                Pharmacy Dashboard
            </button>

        </a>
        
        <a href="{{ url_for('ward_dashboard') }}">

            <button class="nav-btn">
                Ward & Bed Management
            </button>
        
        </a>
        <a href="{{ url_for('attendance_dashboard') }}"> 
            <button class="nav-btn"> 
                Staff Management 
            </button> 
        </a>

        </a>
        <a href="{{ url_for('inventory_dashboard') }}"> 
            <button class="nav-btn"> 
                Inventory Management
            </button> 
        </a>
        
        <a href="{{ url_for('reports_dashboard') }}">

            <button class="nav-btn">
                Reports & Analytics
            </button>
        
        </a>
        

    </div>

</body>

</html>
