
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Shift Dashboard</title>

    <style>

        body{
            font-family:Arial;
            background:#f1f5f9;
        }

        .container{
            width:95%;
            margin:auto;
            margin-top:40px;
        }

        .btn{

            padding:14px 20px;
            border:none;
            border-radius:10px;

            background:#2563eb;
            color:white;

            cursor:pointer;
            margin-bottom:20px;
        }

        table{

            width:100%;
            background:white;

            border-collapse:collapse;
        }

        th{

            background:#2563eb;
            color:white;
            padding:15px;
        }

        td{

            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

    </style>

</head>

<body>

    <div class="container">

        <a href="{{ url_for('add_shift') }}">
            <button class="btn">Add Shift</button>
        </a>

        <table>

            <tr>

                <th>Shift ID</th>
                <th>Employee</th>
                <th>Role</th>
                <th>Date</th>
                <th>Shift Time</th>
                <th>Department</th>

            </tr>

            {% for row in shifts %}

            <tr>

                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
                <td>{{ row[4] }}</td>
                <td>{{ row[5] }}</td>
                <td>{{ row[6] }}</td>

            </tr>

            {% endfor %}

        </table>

    </div>

</body>
</html>
