<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Vendor Dashboard</title> <style> *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial; } body{ background:#f1f5f9; } .topbar{ background:#0f172a; color:white; padding:20px; display:flex; justify-content:space-between; align-items:center; } .container{ width:95%; margin:auto; margin-top:40px; } .add-btn{ background:#2563eb; color:white; padding:12px 20px; border:none; border-radius:10px; cursor:pointer; margin-bottom:20px; } table{ width:100%; background:white; border-collapse:collapse; } table th, table td{ padding:15px; border:1px solid #ddd; text-align:center; } table th{ background:#2563eb; color:white; } </style> </head> <body> <div class="topbar"> <h1>Vendor Dashboard</h1> </div> <div class="container"> <a href="{{ url_for('add_vendor') }}"> <button class="add-btn"> Add Vendor </button> </a> <table> <tr> <th>Vendor ID</th> <th>Vendor Name</th> <th>Company</th> <th>Phone</th> <th>Email</th> <th>Supplied Items</th> </tr> {% for vendor in vendors %} <tr> <td>{{ vendor[1] }}</td> <td>{{ vendor[2] }}</td> <td>{{ vendor[3] }}</td> <td>{{ vendor[4] }}</td> <td>{{ vendor[5] }}</td> <td>{{ vendor[7] }}</td> </tr> {% endfor %} </table> </div> </body> </html>
