<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Stock Alerts</title>

    <style>

        body{
            font-family:Arial;
            background:#fef2f2;
            padding:30px;
        }

        h1{

            color:red;
            margin-bottom:20px;
        }

        table{

            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td{

            padding:15px;
            border:1px solid #ddd;
            text-align:center;
        }

        th{

            background:red;
            color:white;
        }

    </style>

</head>

<body>

    <h1>Low Stock Alerts</h1>

    <table>

        <tr>

            <th>Medicine ID</th>
            <th>Medicine Name</th>
            <th>Current Stock</th>
            <th>Alert Level</th>

        </tr>

        {% for alert in alerts %}

        <tr>

            <td>{{ alert[1] }}</td>
            <td>{{ alert[2] }}</td>
            <td>{{ alert[5] }}</td>
            <td>{{ alert[9] }}</td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
