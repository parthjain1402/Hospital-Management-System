
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Add Purchase Order</title>

    <style>

        body{
            background:#f1f5f9;
            font-family:Arial;
        }

        .form-container{

            width:50%;
            margin:auto;
            margin-top:40px;

            background:white;
            padding:30px;

            border-radius:15px;
        }

        input,
        select{

            width:100%;
            padding:12px;
            margin-top:15px;
        }

        button{

            width:100%;
            padding:15px;
            margin-top:20px;

            background:#2563eb;
            color:white;

            border:none;
            border-radius:10px;
        }

    </style>

</head>

<body>

    <div class="form-container">

        <h1>Add Purchase Order</h1>

        <form method="POST">

            <select name="vendor_name">

                {% for vendor in vendors %}

                <option>{{ vendor[0] }}</option>

                {% endfor %}

            </select>

            <select name="equipment_name">

                {% for equipment in equipments %}

                <option>{{ equipment[0] }}</option>

                {% endfor %}

            </select>

            <input type="number" name="quantity" placeholder="Quantity" required>

            <input type="number" step="0.01" name="unit_price" placeholder="Unit Price" required>

            <input type="date" name="order_date" required>

            <input type="date" name="delivery_date" required>

            <select name="order_status">

                <option>Pending</option>
                <option>Delivered</option>
                <option>Cancelled</option>

            </select>

            <button type="submit">
                Add Purchase Order
            </button>

        </form>

    </div>

</body>

</html>
